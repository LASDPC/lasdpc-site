services:
  mongo:
    image: mongo:7
    container_name: lasdpc-mongo
    restart: unless-stopped
    ports:
      # 27018 no host para evitar conflito com instalações nativas locais de mongod.
      # Dentro da network do compose, outros containers continuam usando "mongo:27017".
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: lasdpc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: ./backend/.env
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  minio-init:
    image: minio/mc:latest
    container_name: lasdpc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file: ./backend/.env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$MINIO_BUCKET &&
      mc anonymous set download local/$$MINIO_BUCKET &&
      echo 'MinIO bucket provisioned: '$$MINIO_BUCKET
      "
    restart: "no"

volumes:
  mongo_data:
  minio_data:
